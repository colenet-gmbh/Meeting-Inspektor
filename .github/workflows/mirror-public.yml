name: Mirror to public repo

on:
  push:
    branches: [main]

jobs:
  mirror:
    # Guard: this file gets mirrored into braunle77/Meeting-Inspektor,
    # where it must not run (no MIRROR_TOKEN there, would mirror onto itself)
    if: github.repository == 'colenet-gmbh/Meeting-Inspektor'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push mirror to braunle77/Meeting-Inspektor
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          git config --local --unset-all http.https://github.com/.extraheader 2>/dev/null || true
          git push "https://braunle77:${MIRROR_TOKEN}@github.com/braunle77/Meeting-Inspektor.git" HEAD:main --force
