name: Mirror to public repo

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push mirror to braunle77/Meeting-Inspektor
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          git config --global credential.helper store
          echo "https://braunle77:${MIRROR_TOKEN}@github.com" > ~/.git-credentials
          git push https://github.com/braunle77/Meeting-Inspektor.git HEAD:main --force
